<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第七站：生物分類跑酷賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dora-blue: #0096D6;
            --dora-red: #E3001B;
            --dora-yellow: #FFD900;
            --pure-white: #FFFFFF;
            --bg-color: #E8F6FC;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        /* 按鈕共用樣式 */
        .btn-action {
            background-color: var(--dora-blue);
            color: white;
            border-radius: 16px;
            font-weight: 900;
            box-shadow: 0 6px 0 #0077AA;
            transition: all 0.1s;
            cursor: pointer;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 0 0 #0077AA; }
        
        .btn-red {
            background-color: var(--dora-red);
            color: white;
            border-radius: 999px;
            font-weight: 900;
            box-shadow: 0 6px 0 #B30015;
            transition: all 0.1s;
            cursor: pointer;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-red:active { transform: translateY(6px); box-shadow: 0 0 0 #B30015; }

        .btn-gray {
            background-color: #9CA3AF;
            color: white;
            border-radius: 16px;
            font-weight: 900;
            box-shadow: 0 6px 0 #6B7280;
            transition: all 0.1s;
            cursor: pointer;
        }
        .btn-gray:active { transform: translateY(6px); box-shadow: 0 0 0 #6B7280; }

        /* 分類選項按鈕 (放大版) */
        .category-btn {
            background-color: white;
            border: 4px solid var(--dora-blue);
            color: var(--dora-blue);
            border-radius: 20px;
            padding: 16px 8px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0 var(--dora-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            min-height: 110px;
        }
        .category-btn:hover { background-color: #f0f9ff; }
        .category-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--dora-blue); }

        /* 跑酷區與生物卡片 */
        .track-area {
            width: 100%;
            height: 250px;
            background: #e2e8f0;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
            border: 4px dashed #cbd5e1;
        }
        
        .runner {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 0;
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 4px solid var(--dora-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140px;
            z-index: 10;
        }
        .runner img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        /* 終點警示區 */
        .danger-zone {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 50px;
            background: repeating-linear-gradient(
                45deg,
                #ffcccc,
                #ffcccc 15px,
                #ff9999 15px,
                #ff9999 30px
            );
            border-left: 6px solid var(--dora-red);
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 動畫特效 */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, -50%, 0); }
            20%, 80% { transform: translate3d(4px, -50%, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, -50%, 0); }
            40%, 60% { transform: translate3d(8px, -50%, 0); }
        }
        .main-shake { animation: mainShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes mainShake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .pop-out { animation: popOut 0.3s ease-out forwards; }
        @keyframes popOut {
            0% { transform: translateY(-50%) scale(1); opacity: 1; }
            100% { transform: translateY(-100%) scale(1.5); opacity: 0; }
        }

        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 提示彈跳視窗與結果視窗 */
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .overlay-content {
            background: white; padding: 40px 30px; border-radius: 32px; text-align: center;
            max-width: 500px; width: 90%; border: 6px solid var(--dora-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-height: 90vh; overflow-y: auto;
        }

        /* 輸入框 */
        .input-field {
            width: 100%; padding: 16px; border-radius: 16px; border: 3px solid #cbd5e1;
            font-size: 20px; font-weight: bold; margin-bottom: 16px; text-align: center;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: var(--dora-blue); outline: none; box-shadow: 0 0 0 4px rgba(0,150,214,0.2); }
    </style>
</head>
<body>

    <!-- 頂部導航 -->
    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="font-black text-[var(--dora-blue)] text-2xl md:text-3xl flex items-center gap-3">
                <i class="fa-solid fa-person-running"></i>
                生物分類跑酷賽
            </div>
            <div class="text-base font-bold text-gray-500 bg-gray-100 px-4 py-2 rounded-full">
                終極挑戰
            </div>
        </div>
    </header>

    <!-- 遊戲主畫面 -->
    <main id="main-game-area" class="max-w-4xl mx-auto px-4 py-6">
        
        <!-- 狀態列 -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border-4 border-[var(--dora-blue)] mb-6 flex justify-between items-center pop-in">
            <div class="text-2xl md:text-3xl font-black text-[var(--dora-blue)]">
                分數: <span id="score" class="text-[var(--dora-red)]">0</span>
            </div>
            <div class="text-2xl md:text-3xl font-black text-[var(--dora-blue)]">
                生命: <span id="lives" class="text-3xl">❤️❤️❤️</span>
            </div>
        </div>

        <!-- 跑酷動畫區 -->
        <div class="track-area mb-8">
            <div class="danger-zone"><i class="fa-solid fa-skull-crossbones text-white text-2xl"></i></div>
            
            <div id="runner" class="runner hidden">
                <img id="runner-img" src="" alt="生物圖片">
                <div id="runner-name" class="font-black text-xl text-[var(--dora-blue)] text-center w-full truncate"></div>
            </div>
            
            <!-- 初始提示語 -->
            <div id="start-hint" class="absolute inset-0 flex items-center justify-center text-gray-400 font-black text-3xl tracking-wider">
                等待遊戲開始...
            </div>
        </div>

        <!-- 分類操作按鈕 -->
        <div class="grid grid-cols-2 gap-4 pb-16">
            <button class="category-btn" onclick="game.checkAnswer('原核生物-細菌')">
                <i class="fa-solid fa-capsules text-3xl mb-2 text-gray-500"></i>
                <span>原核生物</span>
                <span class="text-[var(--dora-red)]">細菌</span>
            </button>
            <button class="category-btn" onclick="game.checkAnswer('原核生物-藍綠菌')">
                <i class="fa-solid fa-sun text-3xl mb-2 text-gray-500"></i>
                <span>原核生物</span>
                <span class="text-[var(--dora-red)]">藍綠菌</span>
            </button>
            <button class="category-btn" onclick="game.checkAnswer('原生生物-藻類')">
                <i class="fa-solid fa-leaf text-3xl mb-2 text-green-600"></i>
                <span>原生生物</span>
                <span class="text-green-600">藻類</span>
            </button>
            <button class="category-btn" onclick="game.checkAnswer('原生生物-原生動物')">
                <i class="fa-solid fa-paw text-3xl mb-2 text-orange-500"></i>
                <span>原生生物</span>
                <span class="text-orange-500">原生動物</span>
            </button>
            <button class="category-btn col-span-2 md:col-span-1 md:col-start-2" onclick="game.checkAnswer('原生生物-原生菌')">
                <i class="fa-solid fa-mushroom text-3xl mb-2 text-purple-600"></i>
                <span>原生生物</span>
                <span class="text-purple-600">原生菌</span>
            </button>
        </div>

    </main>

    <!-- 遊戲覆蓋視窗 (開始/結果) -->
    <div id="gameOverlay" class="overlay">
        <div class="overlay-content pop-in">
            <!-- 開始遊戲標題區 -->
            <div id="overlay-header">
                <i class="fa-solid fa-bolt text-6xl text-[var(--dora-yellow)] mb-4"></i>
                <h1 id="overlayTitle" class="text-4xl md:text-5xl font-black mb-4 text-[var(--dora-blue)]">極速分類跑酷賽</h1>
                <p id="overlayDesc" class="text-xl font-bold text-gray-600 mb-8 leading-relaxed">
                    愈快答對，分數愈高！<br>
                    <span class="text-[var(--dora-red)]">小心別讓生物跑進危險區喔！</span>
                </p>
            </div>

            <!-- 登錄表單區 (預設隱藏) -->
            <div id="login-form" class="hidden mb-6">
                <h2 id="end-status-title" class="text-4xl font-black text-[var(--dora-red)] mb-4"></h2>
                <p class="text-2xl font-black text-[var(--dora-blue)] mb-6">要登錄完成嗎？</p>
                <div class="flex gap-3 mb-2">
                    <input type="text" id="stu-class" class="input-field w-1/2" placeholder="班級 (例:701)">
                    <input type="text" id="stu-seat" class="input-field w-1/2" placeholder="座號 (例:05)">
                </div>
            </div>

            <!-- 按鈕容器 -->
            <div id="overlayBtnContainer" class="flex flex-col gap-4 mt-6">
                <button class="btn-action w-full py-5 text-3xl" onclick="game.start()">開始挑戰！</button>
            </div>
            
            <!-- 返回按鈕 (登錄後或不登錄顯示) -->
            <a id="btn-return" href="CLlll10switch.html" class="btn-red w-full py-5 text-2xl mt-4 hidden">
                <i class="fa-solid fa-forward-step"></i> 返回最終挑戰
            </a>
        </div>
    </div>

    <!-- 遊戲邏輯 -->
    <script>
        // 更新為您指定的 GAS URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxDxpDneO-ECgzZR754jySpIKXtEtOajbygRPrr50DueUzUMFflKRArK8dScFBuC2F1_w/exec";

        // 題庫設定
        const organisms = [
            { name: "草履蟲", img: "CL0801.png", category: "原生生物-原生動物" },
            { name: "線鞭蟲", img: "CL0802.png", category: "原生生物-原生動物" },
            { name: "瘧原蟲", img: "CL0803.png", category: "原生生物-原生動物" },
            { name: "變形蟲", img: "CL0804.png", category: "原生生物-原生動物" },
            { name: "黏菌", img: "CL0805.png", category: "原生生物-原生菌" },
            { name: "單胞藻", img: "CL0701.png", category: "原生生物-藻類" },
            { name: "巨藻", img: "CL0702.png", category: "原生生物-藻類" },
            { name: "石蓴", img: "CL0704.png", category: "原生生物-藻類" },
            { name: "昆布(海帶)", img: "CL0705.png", category: "原生生物-藻類" },
            { name: "紫菜(海苔)", img: "CL0706.png", category: "原生生物-藻類" },
            { name: "石花菜(寒天)", img: "CL0707.png", category: "原生生物-藻類" },
            { name: "矽藻", img: "CL0708.png", category: "原生生物-藻類" },
            { name: "色球藻", img: "CLpic07.png", category: "原核生物-藍綠菌" },
            { name: "顫藻", img: "CLpic08.png", category: "原核生物-藍綠菌" },
            { name: "念珠藻", img: "CLpic09.png", category: "原核生物-藍綠菌" },
            { name: "金黃色葡萄球菌", img: "CLpic03.png", category: "原核生物-細菌" },
            { name: "結核桿菌", img: "CLpic04.png", category: "原核生物-細菌" },
            { name: "鉤端螺旋菌", img: "CLpic05.png", category: "原核生物-細菌" }
        ];

        // 分數設定
        const BASE_SCORE = 5000;
        const MIN_SCORE = 500;
        const PENALTY = 1000;

        const game = {
            score: 0,
            lives: 3,
            currentIndex: 0,
            items: [],
            timer: null,
            position: 0,
            speed: 0.35, 
            isPlaying: false,
            
            init: function() {
                const overlay = document.getElementById('gameOverlay');
                overlay.style.display = 'flex';
                this.resetOverlayToStart();
            },
            
            resetOverlayToStart: function() {
                document.getElementById('overlay-header').classList.remove('hidden');
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('btn-return').classList.add('hidden');
                
                const btnContainer = document.getElementById('overlayBtnContainer');
                btnContainer.innerHTML = '';
                btnContainer.classList.remove('hidden');
                
                const startBtn = document.createElement('button');
                startBtn.className = 'btn-action w-full py-5 text-3xl';
                startBtn.innerHTML = '<i class="fa-solid fa-play"></i> 開始挑戰！';
                startBtn.onclick = () => this.start();
                btnContainer.appendChild(startBtn);
            },
            
            start: function() {
                document.getElementById('gameOverlay').style.display = 'none';
                document.getElementById('start-hint').style.display = 'none';
                
                this.score = 0;
                this.lives = 3;
                this.currentIndex = 0;
                this.isPlaying = true;
                
                // 隨機打亂題目
                this.items = [...organisms].sort(() => Math.random() - 0.5);
                
                this.updateStats();
                this.spawn();
            },
            
            spawn: function() {
                if (this.currentIndex >= this.items.length) {
                    this.end(true);
                    return;
                }
                
                this.position = 0;
                this.speed = 0.35 + (this.currentIndex * 0.015); 
                
                const currentItem = this.items[this.currentIndex];
                const runner = document.getElementById('runner');
                const runnerImg = document.getElementById('runner-img');
                
                runnerImg.src = currentItem.img;
                runnerImg.onerror = function() {
                    this.src = `https://placehold.co/120x120/4A90E2/FFF?text=${encodeURIComponent(currentItem.name)}`;
                };
                document.getElementById('runner-name').innerText = currentItem.name;
                
                runner.style.left = '0%';
                runner.style.display = 'flex';
                runner.classList.remove('hidden', 'pop-out', 'shake');
                
                clearInterval(this.timer);
                this.timer = setInterval(() => this.tick(), 20); 
            },
            
            tick: function() {
                if (!this.isPlaying) return;
                
                this.position += this.speed;
                const runner = document.getElementById('runner');
                
                runner.style.left = `calc(${this.position}% - ${this.position * 1.4}px)`;
                
                if (this.position >= 100) {
                    this.handleWrong();
                }
            },
            
            checkAnswer: function(category) {
                if (!this.isPlaying) return;
                
                const currentItem = this.items[this.currentIndex];
                
                if (category === currentItem.category) {
                    this.isPlaying = false;
                    clearInterval(this.timer);
                    
                    let points = Math.floor(BASE_SCORE - (this.position * 45));
                    if (points < MIN_SCORE) points = MIN_SCORE;
                    
                    this.score += points;
                    this.updateStats();
                    
                    const runner = document.getElementById('runner');
                    runner.classList.add('pop-out');
                    
                    setTimeout(() => {
                        runner.style.display = 'none';
                        this.currentIndex++;
                        this.isPlaying = true;
                        this.spawn();
                    }, 300);
                } else {
                    this.score -= PENALTY;
                    if (this.score < 0) this.score = 0;
                    this.updateStats();
                    
                    document.getElementById('main-game-area').classList.add('main-shake');
                    setTimeout(() => document.getElementById('main-game-area').classList.remove('main-shake'), 400);
                    
                    this.handleWrong();
                }
            },
            
            handleWrong: function() {
                this.isPlaying = false;
                clearInterval(this.timer);
                
                this.lives--;
                this.updateStats();
                
                const runner = document.getElementById('runner');
                runner.classList.add('shake');
                
                setTimeout(() => {
                    runner.classList.remove('shake');
                    if (this.lives <= 0) {
                        this.end(false);
                    } else {
                        runner.style.display = 'none';
                        this.currentIndex++;
                        this.isPlaying = true;
                        this.spawn();
                    }
                }, 400);
            },
            
            updateStats: function() {
                document.getElementById('score').innerText = this.score;
                document.getElementById('lives').innerText = '❤️'.repeat(this.lives) + '🖤'.repeat(3 - this.lives);
            },
            
            end: function(isWin) {
                this.isPlaying = false;
                clearInterval(this.timer);
                
                document.getElementById('runner').style.display = 'none';
                document.getElementById('start-hint').style.display = 'flex';
                
                const overlay = document.getElementById('gameOverlay');
                const btnContainer = document.getElementById('overlayBtnContainer');
                
                overlay.style.display = 'flex';
                btnContainer.innerHTML = '';
                
                if (isWin || this.currentIndex > 0) {
                    // 切換至登錄畫面
                    document.getElementById('overlay-header').classList.add('hidden');
                    document.getElementById('login-form').classList.remove('hidden');
                    
                    // 設定狀態標題
                    document.getElementById('end-status-title').innerText = isWin ? '太強了！過關！' : '挑戰結束！';
                    
                    const submitBtn = document.createElement('button');
                    submitBtn.className = 'btn-action w-full py-4 text-2xl mb-2';
                    submitBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 登錄';
                    submitBtn.onclick = () => submitToGAS();
                    
                    const skipBtn = document.createElement('button');
                    skipBtn.className = 'btn-gray w-full py-4 text-2xl';
                    skipBtn.innerHTML = '不登錄';
                    skipBtn.onclick = () => {
                        document.getElementById('login-form').classList.add('hidden');
                        btnContainer.classList.add('hidden');
                        document.getElementById('btn-return').classList.remove('hidden');
                    };
                    
                    btnContainer.appendChild(submitBtn);
                    btnContainer.appendChild(skipBtn);
                } else {
                    document.getElementById('overlay-header').classList.remove('hidden');
                    document.getElementById('overlayTitle').innerText = "挑戰失敗";
                    document.getElementById('overlayTitle').style.color = "#EF5350";
                    document.getElementById('overlayDesc').innerText = "別氣餒，生物分類需要多加練習，再試一次吧！";
                    
                    const retryBtn = document.createElement('button');
                    retryBtn.className = 'btn-action w-full py-4 text-2xl';
                    retryBtn.innerText = "重新開始";
                    retryBtn.onclick = () => this.start();
                    btnContainer.appendChild(retryBtn);
                }
            }
        };

        // 提交完成狀態至 Google Apps Script
        async function submitToGAS() {
            const cls = document.getElementById('stu-class').value.trim();
            const seat = document.getElementById('stu-seat').value.trim();
            
            if (!cls || !seat) {
                alert("請輸入班級與座號喔！");
                return;
            }
            
            // 隱藏表單，顯示載入狀態
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('overlayBtnContainer').classList.add('hidden');
            
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-status';
            loadingDiv.className = 'text-2xl font-bold text-[var(--dora-blue)] py-8';
            loadingDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 登錄中，請稍候...';
            document.querySelector('.overlay-content').insertBefore(loadingDiv, document.getElementById('btn-return'));

            // 參數設定：傳送 2 給 GAS 腳本，使用 score=2 與 completed=2 雙重確保相容性
            const requestUrl = `${GAS_URL}?class=${encodeURIComponent(cls)}&seat=${encodeURIComponent(seat)}&score=2&completed=2`;

            try {
                // 使用 no-cors 模式確保 GET 請求送出，忽略跨網域讀取限制
                await fetch(requestUrl, { mode: 'no-cors' });
                
                document.getElementById('loading-status').innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-5xl mb-4"></i><br><span class="text-green-600 text-3xl">登錄成功！</span>';
                document.getElementById('btn-return').classList.remove('hidden');
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('loading-status').innerHTML = `
                    <div class="text-red-500 text-xl mb-4"><i class="fa-solid fa-triangle-exclamation text-3xl"></i><br>成績已送出，但網路無回應。<br>請直接點擊下方按鈕繼續。</div>
                `;
                document.getElementById('btn-return').classList.remove('hidden');
            }
        }

        // 頁面載入時初始化
        window.onload = () => {
            game.init();
        };

    </script>
</body>
